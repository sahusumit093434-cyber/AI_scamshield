services:
  - type: web
    name: scamshield-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
        placeholder: "mongodb+srv://..."
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
        placeholder: "https://your-vercel-frontend-url.vercel.app"
